name: Sync LeetCode

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: LeetCode Sync
        uses: qishibo/LeetCode-Solution-Sync@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          root-folder: leetcode
          commit-message: "Add LeetCode solutions"
